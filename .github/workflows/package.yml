name: Package Native Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_VERSION: "1.0.0"
  JAVA_VERSION: "21"
  JLINK_MODULES: "java.base,java.desktop,java.logging,java.net.http,java.scripting,java.xml,jdk.jfr,jdk.jsobject,jdk.unsupported,jdk.unsupported.desktop,jdk.xml.dom"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            pkg-type: dmg
            icon: packaging/icons/sangeet-icon.icns
            artifact-ext: dmg
            jpackage-extra: >-
              --mac-package-name SangeetEditor
              --mac-package-identifier com.sangeet.noteseditor
          - os: windows-latest
            platform: windows
            pkg-type: msi
            icon: packaging/icons/sangeet-icon.ico
            artifact-ext: msi
            jpackage-extra: >-
              --win-dir-chooser
              --win-shortcut
              --win-menu
              --win-menu-group Sangeet
          - os: ubuntu-latest
            platform: linux
            pkg-type: deb
            icon: packaging/icons/sangeet-icon-256.png
            artifact-ext: deb
            jpackage-extra: >-
              --linux-shortcut
              --linux-menu-group AudioVideo;Music
              --linux-app-category music

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }} (${{ matrix.pkg-type }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build fat JAR
        run: sbt assembly

      - name: Show fat JAR size
        run: ls -lh target/scala-3.4.2/sangeet-notes-editor.jar
        shell: bash

      - name: Create minimal JVM runtime (jlink)
        run: |
          jlink \
            --add-modules ${{ env.JLINK_MODULES }} \
            --strip-debug \
            --no-man-pages \
            --no-header-files \
            --compress zip-9 \
            --output custom-runtime
        shell: bash

      - name: Show runtime size
        run: du -sh custom-runtime
        shell: bash

      - name: Stage fat JAR
        run: |
          mkdir -p staging dist
          cp target/scala-3.4.2/sangeet-notes-editor.jar staging/
        shell: bash

      - name: Package with jpackage
        run: |
          jpackage \
            --name "Sangeet Notes Editor" \
            --app-version "${{ env.APP_VERSION }}" \
            --vendor "Sangeet Project" \
            --description "Desktop notation editor for Hindustani classical music" \
            --input staging \
            --main-jar sangeet-notes-editor.jar \
            --main-class sangeet.editor.MainApp \
            --type ${{ matrix.pkg-type }} \
            --dest dist \
            --icon ${{ matrix.icon }} \
            --runtime-image custom-runtime \
            --java-options "--add-opens=java.base/java.lang=ALL-UNNAMED" \
            --java-options "-Xmx512m" \
            ${{ matrix.jpackage-extra }}
        shell: bash

      - name: Show package size
        run: ls -lh dist/
        shell: bash

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: sangeet-notes-editor-${{ matrix.platform }}
          path: dist/*.${{ matrix.artifact-ext }}
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -ls

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sangeet Notes Editor ${{ github.ref_name }}"
          body: |
            ## Sangeet Notes Editor ${{ github.ref_name }}

            Desktop notation editor for Hindustani classical music (Bhatkhande style).

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | **macOS** | `.dmg` | Open, drag to Applications |
            | **Windows** | `.msi` | Run installer |
            | **Linux** | `.deb` | `sudo dpkg -i <file>.deb` |

            All installers include a bundled JVM — no Java installation required.
          files: artifacts/*
          draft: false
          prerelease: false
