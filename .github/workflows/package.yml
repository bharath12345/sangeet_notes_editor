name: Package Native Installers

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Manual trigger from GitHub UI

env:
  APP_VERSION: "1.0.0"
  JAVA_VERSION: "21"  # LTS version for stable packaging

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            pkg-type: dmg
            icon: packaging/icons/sangeet-icon.icns
            artifact-pattern: "dist/*.dmg"
          - os: windows-latest
            platform: windows
            pkg-type: msi
            icon: packaging/icons/sangeet-icon.ico
            artifact-pattern: "dist/*.msi"
          - os: ubuntu-latest
            platform: linux
            pkg-type: deb
            icon: packaging/icons/sangeet-icon-256.png
            artifact-pattern: "dist/*.deb"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }} (${{ matrix.pkg-type }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Build fat JAR
        run: sbt assembly

      - name: Create dist directory
        run: mkdir -p dist

      - name: Package with jpackage (macOS)
        if: matrix.platform == 'mac'
        run: |
          jpackage \
            --name "Sangeet Notes Editor" \
            --app-version "${{ env.APP_VERSION }}" \
            --vendor "Sangeet Project" \
            --description "Desktop notation editor for Hindustani classical music" \
            --input target/scala-3.4.2 \
            --main-jar sangeet-notes-editor.jar \
            --main-class sangeet.editor.MainApp \
            --type ${{ matrix.pkg-type }} \
            --dest dist \
            --icon ${{ matrix.icon }} \
            --java-options "--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" \
            --java-options "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" \
            --java-options "--add-exports=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" \
            --java-options "-Xmx512m" \
            --mac-package-name "SangeetEditor" \
            --mac-package-identifier "com.sangeet.noteseditor"

      - name: Package with jpackage (Windows)
        if: matrix.platform == 'windows'
        run: |
          jpackage `
            --name "Sangeet Notes Editor" `
            --app-version "${{ env.APP_VERSION }}" `
            --vendor "Sangeet Project" `
            --description "Desktop notation editor for Hindustani classical music" `
            --input target/scala-3.4.2 `
            --main-jar sangeet-notes-editor.jar `
            --main-class sangeet.editor.MainApp `
            --type ${{ matrix.pkg-type }} `
            --dest dist `
            --icon ${{ matrix.icon }} `
            --java-options "--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" `
            --java-options "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" `
            --java-options "--add-exports=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" `
            --java-options "-Xmx512m" `
            --win-dir-chooser `
            --win-shortcut `
            --win-menu `
            --win-menu-group "Sangeet"
        shell: pwsh

      - name: Package with jpackage (Linux)
        if: matrix.platform == 'linux'
        run: |
          jpackage \
            --name "sangeet-notes-editor" \
            --app-version "${{ env.APP_VERSION }}" \
            --vendor "Sangeet Project" \
            --description "Desktop notation editor for Hindustani classical music" \
            --input target/scala-3.4.2 \
            --main-jar sangeet-notes-editor.jar \
            --main-class sangeet.editor.MainApp \
            --type ${{ matrix.pkg-type }} \
            --dest dist \
            --icon ${{ matrix.icon }} \
            --java-options "--add-opens=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" \
            --java-options "--add-opens=javafx.graphics/com.sun.javafx.application=ALL-UNNAMED" \
            --java-options "--add-exports=javafx.graphics/com.sun.glass.ui=ALL-UNNAMED" \
            --java-options "-Xmx512m" \
            --linux-shortcut \
            --linux-menu-group "AudioVideo;Music" \
            --linux-app-category "music"

      - name: List output
        run: ls -lh dist/
        shell: bash

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: sangeet-notes-editor-${{ matrix.platform }}-${{ matrix.pkg-type }}
          path: ${{ matrix.artifact-pattern }}
          retention-days: 90

  # Create a GitHub Release with all installers when triggered by a tag
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sangeet Notes Editor ${{ github.ref_name }}"
          body: |
            ## Sangeet Notes Editor ${{ github.ref_name }}

            Desktop notation editor for Hindustani classical music (Bhatkhande style).

            ### Downloads
            | Platform | File | Notes |
            |----------|------|-------|
            | **macOS** | `.dmg` | Open DMG, drag to Applications |
            | **Windows** | `.msi` | Run installer, follow prompts |
            | **Linux** | `.deb` | `sudo dpkg -i <file>.deb` |

            All installers include a bundled JVM — no Java installation required.

            ### What's included
            - Bhatkhande-style notation rendering with Devanagari swar glyphs
            - Keyboard input (s/r/g/m/p/d/n) with komal/tivra support
            - 11 built-in taals (Teentaal, Ektaal, Jhaptaal, Rupak, etc.)
            - MIDI playback with sitar patch
            - PDF export
            - `.swar` file format (JSON-based)
          files: artifacts/*
          draft: false
          prerelease: false
